name: Generate APK Automatically

on:
  push:
    branches: [ main, master ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build Web Frontend
        run: |
          npm run build --if-present

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Java 17 ko badal kar 21 kar diya taake compile error khatam ho jaye

      - name: Fix Capacitor Platform Link
        run: |
          npx cap add android || echo "Platform already added or skipped"

      - name: Sync Capacitor Android
        run: |
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -X lint:none

      - name: Save APK File
        uses: actions/upload-artifact@v4
        with:
          name: Universal-RPG-Player-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk